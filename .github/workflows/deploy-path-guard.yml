name: Deploy Path Guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify-monorepo-paths:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate required deploy paths
        run: |
          test -d apps/web
          test -f apps/web/package.json
          test -d apps/api

      - name: Build web app from workspace
        run: |
          npm ci
          npm run build
